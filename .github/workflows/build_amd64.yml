name: Build Cereon Template Framework (Win64, Linux64)

on:
    push:
        branches: ["master"]
        paths:
            - ".github/workflows/**"
            - "Source/**"
            - "CMakeLists.txt"
    pull_request:
        branches: ["master"]
        paths:
            - ".github/workflows/**"
            - "Source/**"
            - "CMakeLists.txt"

jobs:
    build:
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false

            matrix:
                os: [ubuntu-latest, windows-latest]
                build_type: [Release]
                c_compiler: [gcc, clang, cl]
                include:
                    - os: windows-latest
                      c_compiler: cl
                      cpp_compiler: cl
                    - os: windows-latest
                      c_compiler: clang
                      cpp_compiler: clang++
                    - os: ubuntu-latest
                      c_compiler: gcc
                      cpp_compiler: g++
                    - os: ubuntu-latest
                      c_compiler: clang
                      cpp_compiler: clang++
                exclude:
                    - os: windows-latest
                      c_compiler: gcc
                    - os: ubuntu-latest
                      c_compiler: cl

        steps:
            - uses: actions/checkout@v4

            - name: Set reusable strings
              id: strings
              shell: bash
              run: |
                  echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

            - name: Set up Clang
              uses: egor-tensin/setup-clang@v2
              with:
                  version: latest
                  platform: x64
                  cc: 0

            - name: Configure CMake
              run: >
                  cmake -B ${{ steps.strings.outputs.build-output-dir }}
                  -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
                  -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
                  -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
                  -S ${{ github.workspace }}

            - name: Build
              run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}
